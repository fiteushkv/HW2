name: CI/CD Pipeline for Sentiment API

# 워크플로우 실행 조건: main 브랜치에 Push 하거나 Pull Request가 발생했을 때
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # 1. 깃허브 저장소의 코드를 러너(Runner)로 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 다중 아키텍처 및 고급 빌드를 위한 Docker Buildx 설정 (캐시 사용 등에 유리함)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Docker Hub 로그인 (Secrets 환경 활용)
      - name: Login to Docker Hub
        # 주의: 이 단계를 위해 GitHub Repository의 Settings -> Secrets and variables -> Actions 에 
        # DOCKERHUB_USERNAME 과 DOCKERHUB_TOKEN(비밀번호 혹은 액세스 토큰) 을 등록해야 합니다!!
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. 도커 이미지 빌드 및 푸시 (Build cache를 활용하여 빌드 속도 최적화 적용)
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          # Pull Request일 경우엔 빌드 테스트만 하고 Push는 하지 않도록 설정
          push: ${{ github.event_name != 'pull_request' }}
          # 태그 설정 (예: 계정명/sentiment-api:latest)
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sentiment-api:latest
          # 레이어 캐시 적용
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/sentiment-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/sentiment-api:buildcache,mode=max

  deploy:
    name: Deploy to Local Machine (Self-hosted)
    # Pull Request가 아닌 실제 Push일 경우, 그리고 앞선 build-and-push 작업이 성공했을 때만 실행
    if: github.event_name != 'pull_request'
    needs: build-and-push
    runs-on: self-hosted
    # 윈도우 러너에서도 기본적으로 bash(리눅스 쉘)를 사용하여 파이프(|)나 || true 문법이 에러 나지 않게 강제 설정합니다.
    defaults:
      run:
        shell: bash

    steps:
      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Pull the latest Docker image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/sentiment-api:latest

      - name: Stop and remove the existing container
        run: |
          # 기존 컨테이너가 실행 중이면 중지 및 삭제 (컨테이너가 없어도 실패하지 않게 || true 사용)
          docker stop sentiment-api-container || true
          docker rm sentiment-api-container || true

      - name: Run the new container
        run: |
          # 백그라운드(-d)로 실행하고, 포트를 연결(-p)하며, 재시작 정책을 추가합니다.
          docker run -d \
            --name sentiment-api-container \
            -p 8000:8000 \
            --restart unless-stopped \
            ${{ secrets.DOCKERHUB_USERNAME }}/sentiment-api:latest
